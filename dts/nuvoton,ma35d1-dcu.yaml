%YAML 1.2
---
$id: http://devicetree.org/schemas/display/nuvoton,ma35d1-dcu.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Nuvoton MA35D1 Display Controller Unit (DCU)

maintainers:
  - Joey Lu <yclu4@nuvoton.com>

description:
  The Nuvoton MA35D1 Display Controller Unit (DCU) supports multiple
  layers of composition, blending, and output to parallel RGB (DPI)
  interfaces.

properties:
  compatible:
    const: nuvoton,ma35d1-dcu

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    items:
      - description: DCU core clock for register access
      - description: DCU pixel clock for display timing

  clock-names:
    items:
      - const: core
      - const: pix0

  resets:
    maxItems: 1

  memory-region:
    maxItems: 1
    description: Phandle to a reserved memory region for framebuffer allocation

  port:
    $ref: /schemas/graph.yaml#/properties/port
    description: Video output port

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names
  - resets
  - port

additionalProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/arm-gic.h>
    #include <dt-bindings/clock/nuvoton,ma35d1-clk.h>
    #include <dt-bindings/reset/nuvoton,ma35d1-reset.h>

    display@40260000 {
        compatible = "nuvoton,ma35d1-dcu";
        reg = <0x40260000 0x2000>;
        interrupts = <GIC_SPI 20 IRQ_TYPE_LEVEL_HIGH>;
        clocks = <&clk DCU_GATE>, <&clk DCUP_DIV>;
        clock-names = "core", "pix0";
        resets = <&sys MA35D1_RESET_DISP>;

        port {
            dpi_out: endpoint {
                remote-endpoint = <&panel_in>;
            };
        };
    };
